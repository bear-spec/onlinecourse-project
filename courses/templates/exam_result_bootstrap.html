<h2>🎉 Congratulations!</h2>

<p>Score: {{ grade }} / {{ possible }}</p>

<h3>Results:</h3>

{% for question in course.question_set.all %}
    <p><b>{{ question.question_text }}</b></p>

    {% for choice in question.choice_set.all %}
        <p>
            {{ choice.choice_text }}
            {% if choice.is_correct %} ✅ Correct {% endif %}
        </p>
    {% endfor %}
{% endfor %}
